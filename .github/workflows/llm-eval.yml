# LLM 评测 CI（独立仓库版：仓库根目录即 llm-eval 项目）
# 配置说明见 README.md「CI 持续集成」

name: LLM Eval

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: llm-eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      EVAL_CI: "true"
      EVAL_FAIL_UNDER: ${{ vars.EVAL_FAIL_UNDER || '85' }}
      EVAL_SUITE: ${{ vars.EVAL_SUITE || 'golden' }}
      EVAL_ENGINE: ${{ vars.EVAL_ENGINE || 'deepeval' }}
      EVAL_STRICT: ${{ vars.EVAL_STRICT || 'true' }}
      EVAL_LIMIT: "0"
      LANGFUSE_DISABLED: "1"
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Smoke tests
        run: python -m unittest tests.test_smoke -v

      - name: LLM evaluation gate
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          SILICONFLOW_MODEL: ${{ vars.SILICONFLOW_MODEL || 'deepseek-ai/DeepSeek-V4-Pro' }}
          SILICONFLOW_JUDGE_MODEL: ${{ vars.SILICONFLOW_JUDGE_MODEL || 'Qwen/Qwen2.5-72B-Instruct' }}
        run: python run_eval.py -v
